<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost Feelings</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .ghost {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            margin-top: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        p {
            font-style: italic;
            color: #90a4ae;
        }
    </style>
</head>
<body>

    <div class="ghost">👻</div>
    <h1>Ghost Feelings</h1>
    <p>A whisper in the digital void.</p>

</body>
</html>
